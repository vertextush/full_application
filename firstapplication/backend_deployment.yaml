apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: backend
  name: backend
  namespace: back
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - image: tushar15july/full_application:backend
        name: full-application-backend
        envFrom:
         - configMapRef:
             name: postgres-config
        ports:
         - containerPort: 3000
