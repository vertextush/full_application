apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: front
  labels:
    app: frontend
    app.kubernetes.io/part-of: full-application
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: tushar15july/micro-services:v2
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: FRONTEND_RELEASE_TAG
              value: v3
          envFrom:
            - configMapRef:
                name: frontend-config
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
