apiVersion: v1
kind: Secret
metadata:
  name: microservices-backend-secret
  namespace: back
  labels:
    app.kubernetes.io/name: microservices-backend
    app.kubernetes.io/part-of: full-application
type: Opaque
stringData:
  # Platform/cloud agnostic full DB connection string.
  # Update this to your managed DB endpoint and credentials.
  DATABASE_URL: "postgresql://postgres:password@your-db-host:5432/myapp_db"
