apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main-app-ingress
  namespace: back
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # Direct routing to user-service (bypasses frontend proxy).
          - path: /api/users(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: user-service
                port:
                  number: 3001
          # Direct routing to dashboard-service (bypasses frontend proxy).
          - path: /api/dashboard(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: dashboard-service
                port:
                  number: 3002
          # Direct routing to settings-service (bypasses frontend proxy).
          - path: /api/settings(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: settings-service
                port:
                  number: 3003
          # All other traffic (including /api/* from browser via frontend proxy) goes to frontend.
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend-proxy
                port:
                  number: 80
