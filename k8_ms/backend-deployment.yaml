apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: back
  labels:
    app: user-service
    app.kubernetes.io/part-of: full-application
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: tushar15july/micro-services:user-service-v1
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: microservices-backend-config
                  key: USER_SERVICE_PORT
          envFrom:
            - configMapRef:
                name: microservices-backend-config
            - secretRef:
                name: microservices-backend-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 30
---
